<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotflash Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4757">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f1e3;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 40px; }
        .log-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle, #ff6b6b, #ff4757);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .log-btn:active { transform: scale(0.95); }
        .stats { margin-top: 40px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>Hotflash</h1>
    <p class="subtitle">Tap to log instantly</p>

    <button class="log-btn" id="flashBtn">🔥 LOG</button>

    <div class="stats">
        Today's Count: <span id="count">0</span>
    </div>

    <script>
        const btn = document.getElementById('flashBtn');
        const countDisplay = document.getElementById('count');

        // Load today's count on startup
        function updateDisplay() {
            const logs = JSON.parse(localStorage.getItem('hotflash_logs') || '[]');
            const todayStr = new Date().toDateString();
            const todayLogs = logs.filter(timestamp => new Date(timestamp).toDateString() === todayStr);
            countDisplay.textContent = todayLogs.length;
        }

        // Log a new hot flash
        btn.addEventListener('click', () => {
            const logs = JSON.parse(localStorage.getItem('hotflash_logs') || '[]');
            logs.push(new Date().toISOString());
            localStorage.setItem('hotflash_logs', JSON.stringify(logs));
            
            // Subtle vibration feedback for mobile devices
            if (navigator.vibrate) navigator.vibrate(100);
            
            updateDisplay();
        });

        // Register Service Worker for Offline PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        updateDisplay();
    </script>
</body>
</html>
